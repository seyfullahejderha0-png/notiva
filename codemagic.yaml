workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      groups:
        - apple_credentials # Codemagic UI'da tanımlayacağınız App Store Connect API key grubu
      vars:
        BUNDLE_ID: "com.notivaapp.notiva"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: 16.2   # Xcode 26 beta yerine stabil 16.2 kullanıyoruz
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Set up keychain
        script: |
          keychain initialize

      - name: Fetch App Store signing files (certificate + provisioning profile)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles

      - name: Get Flutter dependencies
        script: |
          flutter packages pub get

      - name: Build iOS IPA (App Store release)
        script: |
          flutter build ipa \
            --release \
            --build-name=1.0.1 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - seyfullahejderha0@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
