workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      groups:
        - apple_credentials # Codemagic UI'da tanımlayacağınız App Store Connect API key grubu
      vars:
        BUNDLE_ID: "com.notivaapp.notiva"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: 16.2
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Set up keychain
        script: |
          keychain initialize

      - name: Fetch App Store signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Set up code signing on Xcode project
        script: |
          xcode-project use-profiles

      - name: Get Flutter dependencies
        script: |
          flutter packages pub get

      - name: Build iOS without code signing
        script: |
          flutter build ios \
            --release \
            --no-codesign \
            --build-name=1.0.1 \
            --build-number=$BUILD_NUMBER

      - name: Archive and export IPA with App Store signing
        script: |
          # Archive
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$HOME/build/Runner.xcarchive" \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="match AppStore $BUNDLE_ID" \
            | xcpretty

          # Export IPA using the plist generated by xcode-project use-profiles
          xcodebuild \
            -exportArchive \
            -archivePath "$HOME/build/Runner.xcarchive" \
            -exportPath "$HOME/build/ios/ipa" \
            -exportOptionsPlist "$HOME/export_options.plist" \
            | xcpretty

    artifacts:
      - $HOME/build/ios/ipa/*.ipa
      - $HOME/build/Runner.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - seyfullahejderha0@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
